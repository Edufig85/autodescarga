<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">

  <title>Dashboard de Baterias</title>

  manifest.json
  .jsdelivr.net/npm/chart.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:white;
      padding:env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
      min-height:100vh;
    }
    .container{max-width:1400px;margin:auto;}
    .header{text-align:center;margin-bottom:25px;}
    .header h1{font-size:2rem;margin-bottom:10px;}
    .header p{color:#cbd5e1;}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
      margin-bottom:20px;
    }

    .card,.panel{
      background:#1e293b;
      padding:22px;
      border-radius:22px;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    .card h2{font-size:1rem;margin-bottom:12px;color:#93c5fd;}
    .value{font-size:2rem;font-weight:bold;}

    .inputs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    label{color:#cbd5e1;}
    input{
      padding:15px;
      font-size:16px;
      border:none;
      border-radius:14px;
      background:#334155;
      color:white;
    }

    .status{
      padding:20px;
      text-align:center;
      border-radius:18px;
      font-size:1.3rem;
      font-weight:bold;
      margin-bottom:20px;
    }

    .ok{
      background:#123524;
      color:#5eff9d;
      border:2px solid #5eff9d;
    }
    .danger{
      background:#4a1616;
      color:#ff8f8f;
      border:2px solid #ff8f8f;
    }

    .chart-container{height:400px;}
    table{width:100%;border-collapse:collapse;}
    th,td{
      padding:12px;
      border-bottom:1px solid #334155;
      text-align:center;
    }
    th{background:#0f172a;}

    .badge{
      padding:6px 14px;
      border-radius:999px;
      font-weight:bold;
    }
    .green{background:#14532d;color:#86efac;}
    .red{background:#7f1d1d;color:#fca5a5;}

    .footer{text-align:center;color:#94a3b8;margin-top:20px;}
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>Dashboard Inteligente de Baterias</h1>
    <p>iOS • Android • Windows • macOS</p>
  </div>

  <div class="panel">
    <div class="inputs">
      <div>
        <label>Data da última carga</label>
        <input type="date" id="dataCarga">
      </div>
      <div>
        <label>Tensão atual medida (V)</label>
        <input type="number" step="0.01" id="tensaoAtual" placeholder="Ex: 12.45">
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card"><h2>Dias sem carga</h2><div id="dias" class="value">0</div></div>
    <div class="card"><h2>Tensão mínima esperada</h2><div id="tensaoMinima" class="value">0V</div></div>
    <div class="card"><h2>Tensão informada</h2><div id="tensaoDigitada" class="value">0V</div></div>
    <div class="card"><h2>Status</h2><div id="resultado" class="value">---</div></div>
  </div>

  <div id="statusBox" class="status ok">Preencha os dados acima.</div>

  <div class="panel">
    <h2>Gráfico de Autodescarga</h2>
    <div class="chart-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="footer">Funciona offline como PWA</div>
</div>

<script>
const dados=[
  {dias:0,t:13.01},{dias:30,t:12.42},{dias:60,t:12.28},{dias:90,t:12.20},
  {dias:120,t:12.10},{dias:150,t:11.91},{dias:180,t:11.72}
];

new Chart(grafico,{
  type:'line',
  data:{
    labels:dados.map(d=>d.dias),
    datasets:[{
      label:'Tensão mínima',
      data:dados.map(d=>d.t),
      borderWidth:4,
      tension:.4,
      fill:true
    }]
  },
  options:{maintainAspectRatio:false}
});

function atualizar(){
  const d=document.getElementById('dataCarga').value;
  const v=parseFloat(tensaoAtual.value);
  if(!d||isNaN(v))return;

  const dias=Math.floor((new Date()-new Date(d))/(86400000));
  const ref=dados.reduce((a,b)=>Math.abs(b.dias-dias)<Math.abs(a.dias-dias)?b:a);

  diasEl.textContent=dias;
  tensaoMinima.textContent=ref.t.toFixed(2)+'V';
  tensaoDigitada.textContent=v.toFixed(2)+'V';

  if(v>=ref.t){
    statusBox.className='status ok';
    statusBox.textContent='BATERIA OK';
    resultado.textContent='OK';
  }else{
    statusBox.className='status danger';
    statusBox.textContent='TENSÃO ABAIXO DO MÍNIMO';
    resultado.textContent='ALERTA';
  }
}

dataCarga.oninput=tensaoAtual.oninput=atualizar;

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
