<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">

  <title>Dashboard de Baterias</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#fff;
      padding:20px;
    }
    .container{max-width:1200px;margin:auto}
    h1{text-align:center;margin-bottom:5px}
    p{text-align:center;color:#cbd5e1;margin-bottom:30px}

    .panel,.card{
      background:#1e293b;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
    }

    .inputs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    label{color:#cbd5e1}
    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background:#334155;
      color:#fff;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card h2{font-size:0.95rem;color:#93c5fd;margin-bottom:10px}
    .value{font-size:1.8rem;font-weight:bold}

    .status{
      text-align:center;
      padding:18px;
      border-radius:16px;
      font-size:1.2rem;
      font-weight:bold;
    }
    .ok{background:#123524;color:#5eff9d}
    .danger{background:#4a1616;color:#ff9b9b}

    .chart-container{height:380px}
  </style>
</head>

<body>
<div class="container">

  <h1>Dashboard Inteligente de Baterias</h1>
  <p>iOS • Android • Windows • macOS</p>

  <div class="panel">
    <div class="inputs">
      <div>
        <label>Data da última carga</label>
        <input type="date" id="dataCarga">
      </div>
      <div>
        <label>Tensão atual medida (V)</label>
        <input type="number" step="0.01" id="tensaoAtual" placeholder="Ex: 12.45">
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Dias sem carga</h2>
      <div class="value" id="dias">0</div>
    </div>
    <div class="card">
      <h2>Tensão mínima esperada</h2>
      <div class="value" id="tensaoMinima">0V</div>
    </div>
    <div class="card">
      <h2>Tensão informada</h2>
      <div class="value" id="tensaoDigitada">0V</div>
    </div>
    <div class="card">
      <h2>Status</h2>
      <div class="value" id="resultado">---</div>
    </div>
  </div>

  <div id="statusBox" class="status ok" style="margin-bottom:25px">
    Preencha os dados acima.
  </div>

  <div class="panel">
    <h2 style="margin-bottom:15px">Gráfico de Autodescarga</h2>
    <div class="chart-container">
      <canvas id="grafico"></canvas>
    </div>
  </div>

</div>

<script>
/* ==========================
   PLANILHA DE REFERÊNCIA
   ========================== */
const tabelaReferencia = [
  { dias: 0,   tensao: 13.01 },
  { dias: 30,  tensao: 12.42 },
  { dias: 60,  tensao: 12.28 },
  { dias: 90,  tensao: 12.20 },
  { dias: 120, tensao: 12.10 },
  { dias: 150, tensao: 11.91 },
  { dias: 180, tensao: 11.72 },
  { dias: 210, tensao: 11.61 },
  { dias: 240, tensao: 11.42 },
  { dias: 270, tensao: 11.22 }
];

/* ==========================
   GRÁFICO
   ========================== */
new Chart(document.getElementById('grafico'), {
  type: 'line',
  data: {
    labels: tabelaReferencia.map(i => i.dias),
    datasets: [{
      label: 'Tensão mínima (V)',
      data: tabelaReferencia.map(i => i.tensao),
      borderWidth: 3,
      tension: 0.4,
      fill: true
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

/* ==========================
   ATUALIZAÇÃO AUTOMÁTICA
   ========================== */
function atualizarDashboard() {
  const data = document.getElementById('dataCarga').value;
  const tensao = parseFloat(document.getElementById('tensaoAtual').value);
  if (!data || isNaN(tensao)) return;

  const hoje = new Date();
  const ultimaCarga = new Date(data + 'T00:00:00');
  const dias = Math.floor((hoje - ultimaCarga) / 86400000);

  const referencia = tabelaReferencia.reduce((a, b) =>
    Math.abs(b.dias - dias) < Math.abs(a.dias - dias) ? b : a
  );

  document.getElementById('dias').innerText = dias;
  document.getElementById('tensaoMinima').innerText = referencia.tensao.toFixed(2) + 'V';
  document.getElementById('tensaoDigitada').innerText = tensao.toFixed(2) + 'V';

  const statusBox = document.getElementById('statusBox');
  const resultado = document.getElementById('resultado');

  if (tensao >= referencia.tensao) {
    statusBox.className = 'status ok';
    statusBox.innerText = 'BATERIA ACIMA DA TENSÃO MÍNIMA ACEITÁVEL';
    resultado.innerText = 'OK';
  } else {
    statusBox.className = 'status danger';
    statusBox.innerText = 'BATERIA ABAIXO DA TENSÃO MÍNIMA ACEITÁVEL';
    resultado.innerText = 'ALERTA';
  }
}

document.getElementById('dataCarga')
  .addEventListener('input', atualizarDashboard);
document.getElementById('tensaoAtual')
  .addEventListener('input', atualizarDashboard);

/* PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
